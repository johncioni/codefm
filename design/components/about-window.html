<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Code FM — About</title>
<style>
:root{
  --rust:#c1502a;
  --window-bg:#ececee; --control-bg:#ffffff; --separator:rgba(0,0,0,.1);
  --label:#1d1d1f; --secondary-label:rgba(60,60,67,.6); --tertiary-label:rgba(60,60,67,.3);
  --link:#0068da;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font); background:#c9ccd4; -webkit-font-smoothing:antialiased;
  display:flex; align-items:flex-start; justify-content:center; padding:26px}

/* macOS window — [.titled,.closable], transparent titlebar (no fullSizeContentView),
   so content sits below a 28px titlebar band that holds the traffic lights. */
.window{width:420px; border-radius:10px; background:var(--window-bg);
  position:relative; overflow:hidden; box-shadow:0 18px 50px rgba(0,0,0,.3), 0 0 0 .5px rgba(0,0,0,.12)}
.titlebar{height:28px; position:relative}
.traffic{position:absolute; top:8px; left:13px; display:flex; gap:8px; z-index:5}
.traffic span{width:12px; height:12px; border-radius:50%}
.traffic .r{background:#ff5f57} .traffic .y{background:#febc2e} .traffic .g{background:#28c840}

.content{position:relative; height:340px; text-align:center}

/* ---- Spinning vinyl ---- */
.vinyl-wrap{position:absolute; top:25px; left:50%; transform:translateX(-50%); width:120px; height:120px}
.vinyl{position:absolute; inset:0; border-radius:50%;
  background:
    repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,.05) 0 .5px, rgba(0,0,0,0) .6px 2.1px),
    radial-gradient(circle at 50% 50%, #232323 0%, #0a0a0a 68%, #141414 100%);
  box-shadow:0 3px 9px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.06);
  animation:spin 10s linear infinite}
@keyframes spin{to{transform:rotate(-360deg)}}
.vinyl .label{position:absolute; top:50%; left:50%; width:46px; height:46px; margin:-23px 0 0 -23px;
  border-radius:50%; background:#d67557; box-shadow:inset 0 0 0 .6px rgba(0,0,0,.12); overflow:hidden;
  display:flex; align-items:center; justify-content:center}
.vinyl .label img{width:36px; height:36px}
.vinyl-wrap .gloss{position:absolute; inset:0; border-radius:50%; pointer-events:none;
  background:
    radial-gradient(circle at 34% 70%, rgba(255,255,255,.14), rgba(255,255,255,0) 58%),
    radial-gradient(circle at 68% 30%, rgba(255,255,255,.07), rgba(255,255,255,0) 55%)}
.vinyl-wrap .hole{position:absolute; top:50%; left:50%; width:4px; height:4px; margin:-2px 0 0 -2px;
  border-radius:50%; background:#000; z-index:3}

.app-name{position:absolute; top:145px; left:0; right:0; font-size:24px; font-weight:700; color:var(--label)}
.tagline{position:absolute; top:181px; left:0; right:0; font-size:13px; color:var(--secondary-label)}

/* Info box */
.info-box{position:absolute; top:223px; left:30px; right:30px; height:50px; border-radius:8px;
  background:var(--control-bg); border:1px solid var(--separator);
  display:flex; align-items:center; justify-content:space-between; padding:0 15px; text-align:left}
.info-col .hdr{font-size:10px; font-weight:500; color:var(--tertiary-label); letter-spacing:.4px}
.info-col .val{font-size:14px; color:var(--label); margin-top:2px}
.info-col.right{text-align:right}

.credits{position:absolute; top:284px; left:0; right:0; font-size:12px; color:var(--link)}
.footer{position:absolute; top:311px; left:0; right:0; font-size:11px; color:var(--tertiary-label)}
</style>
</head>
